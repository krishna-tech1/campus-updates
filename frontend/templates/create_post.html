<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Update | Campus Updates</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
    <a href="/" class="nav-brand">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span>Campus Updates</span>
    </a>

    <div class="nav-links">
        <a href="/" class="nav-link">Home</a>
        <a href="/logout" class="nav-link">Logout</a>
    </div>
</nav>

<main class="main-content" style="max-width: 600px;">
    <div class="animate-fade-in">
        <header style="margin-bottom: 2rem;">
            <h1 style="font-size: 1.875rem; letter-spacing: -0.025em; font-weight: 800;">Share an Update</h1>
            <p style="color: var(--text-muted);">Inform your fellow students about events, clubs, or news.</p>
        </header>

        <form action="/create-post" method="post" enctype="multipart/form-data" class="card">
            <div class="form-group">
                <label class="label" for="description">Content</label>
                <textarea 
                    name="description" 
                    id="description" 
                    class="textarea" 
                    placeholder="What's happening in college today?" 
                    required></textarea>
            </div>

            <div class="form-group">
                <label class="label" for="image">Attachment (Optional)</label>
                <div style="padding: 1rem; border: 2px dashed var(--border); border-radius: var(--radius); text-align: center; position: relative;">
                    <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;">Click to upload or drag & drop</div>
                    <input 
                        type="file" 
                        name="image" 
                        id="image" 
                        accept="image/*" 
                        onchange="previewImage(event)"
                        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;">
                    <button type="button" class="btn btn-outline" style="pointer-events: none;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect><circle cx="9" cy="9" r="2"></circle><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path></svg>
                        Choose Image
                    </button>
                    <div id="file-name" style="font-size: 0.75rem; margin-top:0.5rem; color:var(--primary); font-weight: 500;"></div>
                </div>
                <img id="preview">
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button type="submit" class="btn btn-primary" id="submitBtn" style="flex: 1;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    Post to Feed
                </button>
                <a href="/" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</main>

<script>
function previewImage(event) {
    const file = event.target.files[0];
    const preview = document.getElementById("preview");
    const fileNameDisplay = document.getElementById("file-name");
    
    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
        fileNameDisplay.textContent = `Selected: ${file.name}`;
    }
}

document.querySelector("form").addEventListener("submit", function () {
    const btn = document.getElementById("submitBtn");
    btn.innerHTML = `<svg style="animation: spin 1s linear infinite;" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg> Posting...`;
    btn.disabled = true;
});
</script>

<style>
@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
</style>

</body>
</html>
